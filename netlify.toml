[build]
  command = "pnpm --filter @workspace/facesync... --filter @workspace/api-server... build"
  publish = "artifacts/facesync/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_FLAGS = "--shamefully-hoist"

[functions]
  directory = "artifacts/api-server/dist"
  node_bundler = "esbuild"
  external_node_modules = ["pg", "pg-native"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
