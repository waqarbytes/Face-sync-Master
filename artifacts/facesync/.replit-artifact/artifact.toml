kind = "web"
previewPath = "/"
title = "FaceSync"
version = "1.0.0"
id = "artifacts/facesync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21467

[services.development]
run = "pnpm --filter @workspace/facesync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/facesync", "run", "build" ]
publicDir = "artifacts/facesync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21467"
BASE_PATH = "/"
